<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>md-editor playground</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 820px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      md-editor {
        display: block;
        height: 45vh;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      md-preview {
        display: block;
        height: 30vh;
        overflow: auto;
        margin-top: 1rem;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      h1 {
        font-size: 1.25rem;
      }
      h2 {
        font-size: 1rem;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>md-editor playground</h1>
    <md-editor id="editor"></md-editor>
    <h2>md-preview (read-only, updates live)</h2>
    <md-preview id="preview"></md-preview>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
